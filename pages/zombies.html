<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });

    // Данные бестиария
    const zombies = [
        // Обычные
        { name: "Ходок", type: "normal", hp: 150, dmg: "Средний", speed: "Медленный", desc: "Самый распространённый зомби. Ночью становится одичавшим." },
        { name: "Толстяк", type: "normal", hp: 250, dmg: "Высокий", speed: "Очень медленный", desc: "Много здоровья, медленно ходит." },
        { name: "Медсестра", type: "normal", hp: 180, dmg: "Средний", speed: "Средний", desc: "Часто встречается в больницах." },
        { name: "Стив", type: "normal", hp: 160, dmg: "Средний", speed: "Средний", desc: "Обычный парень в кепке." },
        { name: "Женщина в платье", type: "normal", hp: 140, dmg: "Низкий", speed: "Средний", desc: "Быстро бегает ночью." },
        { name: "Фермер", type: "normal", hp: 170, dmg: "Средний", speed: "Медленный", desc: "Встречается на фермах." },
        { name: "Шахтёр", type: "normal", hp: 190, dmg: "Средний", speed: "Медленный", desc: "Имеет шлем, слегка бронирован." },
        { name: "Гниющий труп", type: "normal", hp: 130, dmg: "Низкий", speed: "Медленный", desc: "Слабый, но может вызвать инфекцию." },
        // Бронированные
        { name: "Байкер", type: "armored", hp: 300, dmg: "Высокий", speed: "Средний", desc: "Шлем снижает урон в голову на 20%." },
        { name: "Солдат", type: "armored", hp: 350, dmg: "Очень высокий", speed: "Средний", desc: "Бронежилет, высокое сопротивление урону." },
        { name: "Строитель", type: "armored", hp: 280, dmg: "Высокий", speed: "Медленный", desc: "Каска, сильный удар." },
        { name: "Толстяк в рубашке", type: "armored", hp: 400, dmg: "Высокий", speed: "Очень медленный", desc: "Огромный запас здоровья." },
        { name: "Раздутый зомби", type: "armored", hp: 220, dmg: "Средний", speed: "Медленный", desc: "Взрывается при смерти, нанося урон." },
        // Особые
        { name: "Полицейский", type: "special", hp: 400, dmg: "Очень высокий", speed: "Средний", desc: "Плюётся кислотой, взрывается после смерти." },
        { name: "Горелый", type: "special", hp: 250, dmg: "Высокий", speed: "Быстрый", desc: "Поджигает игрока при контакте. Иммунитет к огню." },
        { name: "Паук-зомби", type: "special", hp: 200, dmg: "Высокий", speed: "Очень быстрый", desc: "Лазает по стенам, наносит кровотечение." },
        { name: "Крикунья", type: "special", hp: 180, dmg: "Низкий", speed: "Средний", desc: "Призывает орду криком. Убивайте в первую очередь." },
        { name: "Подрывник", type: "special", hp: 150, dmg: "Взрыв", speed: "Средний", desc: "При смерти или атаке в грудь взрывается, разрушая блоки." },
        { name: "Одичавший упырь", type: "special", hp: 600, dmg: "Колоссальный", speed: "Быстрый", desc: "Регенерация здоровья, огромный урон. Мини-босс." },
        { name: "Радиационный ходок", type: "radiated", hp: 300, dmg: "Высокий", speed: "Средний", desc: "Светится зелёным, регенерирует здоровье." },
        { name: "Радиационный толстяк", type: "radiated", hp: 500, dmg: "Очень высокий", speed: "Медленный", desc: "Регенерация + огромный запас HP." },
        { name: "Радиационный паук", type: "radiated", hp: 350, dmg: "Высокий", speed: "Очень быстрый", desc: "Регенерация и лазание по стенам." },
        // Животные
        { name: "Зомби-пёс", type: "animal", hp: 120, dmg: "Средний", speed: "Очень быстрый", desc: "Вызывает кровотечение, атакует стаями." },
        { name: "Зомби-медведь", type: "animal", hp: 800, dmg: "Смертельный", speed: "Быстрый", desc: "Босс пустоши. Огромный урон и здоровье." },
        { name: "Зомби-стервятник", type: "animal", hp: 100, dmg: "Средний", speed: "Летающий", desc: "Атакует с воздуха, плюётся." },
        { name: "Грейс (кабаниха)", type: "animal", hp: 500, dmg: "Высокий", speed: "Быстрый", desc: "Уникальный босс в POI «Свиноферма»." },
        { name: "Волк", type: "animal", hp: 150, dmg: "Средний", speed: "Быстрый", desc: "Обычный волк, агрессивен." },
        { name: "Койот", type: "animal", hp: 100, dmg: "Низкий", speed: "Быстрый", desc: "Менее опасен, чем волк." },
        { name: "Пума", type: "animal", hp: 180, dmg: "Высокий", speed: "Очень быстрый", desc: "Скрытная, нападает из засады." }
    ];

    const grid = document.getElementById('zombieGrid');

    function renderZombies(filter = 'all') {
        grid.innerHTML = '';
        const filtered = filter === 'all' ? zombies : zombies.filter(z => z.type === filter);
        filtered.forEach(z => {
            const card = document.createElement('div');
            card.className = 'glass-panel p-5 hover-lift zombie-card';
            card.setAttribute('data-aos', 'fade-up');
            card.innerHTML = `
                <div class="flex items-start justify-between mb-2">
                    <h3 class="text-xl font-bold text-green-300">${z.name}</h3>
                    <span class="text-xs px-2 py-1 rounded bg-green-900/50 text-green-200">${getTypeName(z.type)}</span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-400">❤️ Здоровье:</span> <span class="font-medium">${z.hp}</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">⚔️ Урон:</span> <span class="font-medium">${z.dmg}</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">🏃 Скорость:</span> <span class="font-medium">${z.speed}</span></div>
                    <p class="text-gray-300 mt-3 border-t border-green-800/30 pt-2">${z.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });
        AOS.refresh();
    }

    function getTypeName(type) {
        const map = {
            normal: 'Обычный',
            armored: 'Бронированный',
            special: 'Особый',
            animal: 'Животное',
            radiated: 'Радиационный'
        };
        return map[type] || type;
    }

    // Инициализация
    renderZombies();

    // Фильтры
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            renderZombies(filter);
        });
    });
</script>
